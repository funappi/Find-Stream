name: Crawler Chasseur Nocturne

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

# Variable pour ignorer l'avertissement de dépréciation Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml cloudscraper

      - name: Lancer le Crawler
        run: python crawler.py
        # Le "Pont" entre les secrets GitHub et le Python
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}
